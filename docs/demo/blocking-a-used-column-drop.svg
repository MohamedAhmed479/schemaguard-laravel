<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">SchemaGuard blocks a destructive migration before deployment</title>
  <desc id="desc">Terminal-style demo showing SchemaGuard blocking a migration that drops users.email while Laravel code still uses it.</desc>
  <rect width="1200" height="760" rx="24" fill="#0b1020"/>
  <rect x="32" y="32" width="1136" height="696" rx="18" fill="#111827" stroke="#374151" stroke-width="2"/>
  <circle cx="66" cy="65" r="8" fill="#ef4444"/>
  <circle cx="94" cy="65" r="8" fill="#f59e0b"/>
  <circle cx="122" cy="65" r="8" fill="#22c55e"/>

  <text x="60" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#f9fafb">SchemaGuard blocks a destructive migration before deployment</text>

  <g font-family="Consolas, Menlo, Monaco, monospace" font-size="22">
    <text x="72" y="170" fill="#93c5fd">Migration</text>
    <rect x="72" y="188" width="560" height="76" rx="10" fill="#0f172a" stroke="#1f2937"/>
    <text x="98" y="235" fill="#e5e7eb">$table-&gt;dropColumn(<tspan fill="#fbbf24">'email'</tspan>);</text>

    <text x="72" y="315" fill="#93c5fd">Command</text>
    <rect x="72" y="333" width="1056" height="98" rx="10" fill="#0f172a" stroke="#1f2937"/>
    <text x="98" y="374" fill="#22c55e">$</text>
    <text x="126" y="374" fill="#e5e7eb">php artisan schemaguard:check \</text>
    <text x="126" y="407" fill="#e5e7eb">  --migrations=database/migrations/2026_07_04_000000_drop_email_from_users.php --path=app</text>

    <text x="72" y="482" fill="#93c5fd">Verified output</text>
    <rect x="72" y="500" width="1056" height="130" rx="10" fill="#0f172a" stroke="#1f2937"/>
    <text x="98" y="536" fill="#9ca3af">Analyzed 1 migration(s) - 4 source file(s) - 0 file(s) unparseable</text>
    <text x="98" y="573" fill="#fca5a5" font-weight="700">BLOCK COLUMN_DROPPED users.email</text>
    <text x="98" y="610" fill="#e5e7eb">Impacted usage: MODEL_SCHEMA app/Models/SchemaGuardDemoUser.php:13 DEFINITIVE</text>

    <rect x="72" y="650" width="1056" height="50" rx="10" fill="#7f1d1d" stroke="#ef4444"/>
    <text x="98" y="684" fill="#ffffff" font-weight="700">RESULT: BLOCK</text>
    <text x="915" y="684" fill="#fecaca">exit=1</text>
  </g>

  <text x="60" y="724" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#9ca3af">Static analysis only — no migrations or application code were executed.</text>
</svg>
